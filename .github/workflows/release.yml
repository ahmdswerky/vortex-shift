name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate project
        run: |
          npm run lint
          npm run typecheck
          npm run test
          npm run build

      - name: Build standalone binaries
        run: npm run package

      - name: Normalize binary names
        run: |
          cp bin/vortex-shift-x64 bin/vortex-shift-linux-x64
          cp bin/vortex-shift-arm64 bin/vortex-shift-linux-arm64

      - name: Verify binaries
        run: |
          test -f bin/vortex-shift-linux-x64
          test -f bin/vortex-shift-linux-arm64

      - name: Generate checksums
        run: |
          cd bin
          sha256sum vortex-shift-linux-x64 vortex-shift-linux-arm64 > checksums.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/vortex-shift-linux-x64
            bin/vortex-shift-linux-arm64
            bin/checksums.txt

      - name: Smoke-test install.sh on Rocky Linux
        env:
          VORTEX_SHIFT_REPO: ${{ github.repository }}
          VORTEX_SHIFT_VERSION: ${{ github.ref_name }}
        run: |
          docker run --rm \
            -e VORTEX_SHIFT_REPO \
            -e VORTEX_SHIFT_VERSION \
            -v "$PWD/install.sh:/tmp/install.sh:ro" \
            rockylinux:9 \
            bash -lc 'dnf -y install ca-certificates curl && bash /tmp/install.sh && vortex-shift --version'
